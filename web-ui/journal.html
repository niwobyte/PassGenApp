<!DOCTYPE html>
<html>
    <head lang="eng">
    <meta charset="utf-8">
    <meta name="journal for pswrdtool" content="width=device-width, initial-scale=1.0">


    <style>
        body::-webkit-scrollbar {
            width: 12px;
            background-color: #000;
        }

        body::-webkit-scrollbar-thumb {
            background-color: #9400D3;
            border-radius: 10px;
            border: 3px solid #000;
        }
        body {
            scrollbar-width: none;
            -ms-overflow-style: none; 
            overflow: hidden; 
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #671d87, #000000);
            color: #9400D3;
            font-family: sans-serif;
            display: flex; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            text-shadow: 
            -1px -1px 0 #000,  
            1px -1px 0 #000,
            -1px  1px 0 #000,
            1px  1px 0 #000;
        }
        .exit {
            position: absolute;
            bottom: 20px; 
            left: 20px;
            background: #000;
            color: #9400D3;
            padding: 15px 30px;
            border: 2px solid #9400D3;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 5px #9400D3;
        }
        .exit:hover {
            background: #9400D3;
            color: #000;
            box-shadow: 0 0 20px #9400D3, 0 0 40px #9400D3;
            transform: translateY(-2px);
        }

        .exit:active {
            transform: translateY(0);
        }
    </style>

    <style>
        
        td, th {
            border: none;
            
        }

        input {
            border: 2px solid #000;
            color: #9400D3;
            background: #000;
            outline: none;
            box-shadow: 0 0 3px #9400D3;
            border-radius: 7px;
            transition: 0.6s;
            
        }

        input:hover {
            color: #fff;
            box-shadow: 0 0 7px #9400D3, 0 0 14px #9400D3;
            transform: translateY(-1.25px);
        }


        .journal {
            position: absolute;
            color: #9400D3;
            background: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 7px;
            font-size: 25px;
            box-shadow: 0 0 30px #9400D3;
            
        }
    </style>

    <style>

        td:has(.save) {
            text-align: center;
            padding-top: 20px;
        }

        .save {
             background: #000;
            color: #9400D3;
            padding: 10px 100px;
            border: 2px solid #9400D3;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 5px #9400D3;
            
        }

        .save:hover {
            
            color: #000;
            background: #9400D3;
            box-shadow: 0 0 15px #9400D3, 0 0 30px #9400D3;
            transform: translateY(-2px);
        }

        .save:active {
            transform: translateY(0);
        }
    </style>

    <style>
        form {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    </style>

</head>
<body>

    
     
    
    <a href="index.html">
    <button class="exit">quit</button>
    </a>

    
    <table border="1" class="journal">
        <tr>
            <th colspan="2">passwords</th>
        </tr>
        <tr>
            <td><input type="text" id="p1" placeholder="Enter"></td>
            <td><input type="text" id="p2" placeholder="Enter"></td>
        </tr>
        <tr>
            <td><input type="text" id="p3" placeholder="Enter"></td>
            <td><input type="text" id="p4" placeholder="Enter"></td>
        </tr>
        <tr>
            <td><input type="text" id="p5" placeholder="Enter"></td>
            <td><input type="text" id="p6" placeholder="Enter"></td>
        </tr>
        <tr>
            <td><input type="text" id="p7" placeholder="Enter"></td>
            <td><input type="text" id="p8" placeholder="Enter"></td>
        </tr>
        <tr>
            <td colspan="2"><button type="button" class="save">save</button></td>
        </tr>
    </table>
    
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const inputs = document.querySelectorAll('.journal input');
        const savebtn = document.querySelector('.save');

        inputs.forEach(input => {
            const saved = localStorage.getItem(input.id);
            if (saved) input.value = saved;
            input.oninput = () => localStorage.setItem(input.id, input.value);
        });

        savebtn.onclick = () => {
            let content = "";
            let count = 1;
            let hasData = false;

            inputs.forEach(input => {
                if (input.value.trim() !== "") {
                    content += `${count}. ${input.value}\n\n`;
                    count++;
                    hasData = true;
                }
            });

            if (hasData && window.pywebview && window.pywebview.api) {
                window.pywebview.api.txt(content).then(() => {

                    inputs.forEach(input => {
                        input.value = ""; 
                        localStorage.removeItem(input.id); 
                    });

                });
            }
        };
    });
    </script>


</body>
</html>
