  <script>
var label = document.getElementById("label");
var actual = "";

function generate() {
    var saved = localStorage.getItem('passwordSettings');
    var length = 12; 
    var capital = true;
    var small = true;
    var numbers = true;
    var symbols = true;

    if (saved) {
        var s = JSON.parse(saved);
        length = s.length;
        capital = s.includeUppercase;
        small = s.includeLowercase;
        numbers = s.includeNumbers;
        symbols = s.includeSymbols;
    }

   
    var all = "";
    if (small == true) {
        all = all + "abcdefghijklmnopqrstuvwxyz";
    }
    if (capital == true) {
        all = all + "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    }
    if (numbers == true) {
        all = all + "0123456789";
    }
    if (symbols == true) {
        all = all + "!@#$%^&*";
    }

    if (all == "") {
        label.innerText = "choose something in Settings";
        label.style.color = "red";
        return;
    }

    var result = ""; 
    var cryptoValues = new Uint32Array(length);
    window.crypto.getRandomValues(cryptoValues);
      for (var i = 0; i < length; i++) {
        var index = cryptoValues[i] % all.length;
        result += all.charAt(index); 
    }

    actual = result;
    label.innerText = result;
    label.style.color = "#9400D3"; 
}

function copy() {
    
    if (actual == "" || label.innerText == "Password") {
        return; 
    }

    navigator.clipboard.writeText(actual);
    
    var oldtext = label.innerText;
    label.innerText = "Copied";
    label.style.color = "white";

    setTimeout(function() {
        label.innerText = oldtext;
        label.style.color = "#9400D3";
    }, 1000);
}
  </script>
