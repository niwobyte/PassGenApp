  <label class="label" id="label" onclick="copy()">Password</label>

  <button class="Generate" type="button" onclick="generate()">Generate</button>

  <button class="copyb" onclick="copy()">Copy</button>

  <a href="journal.html">
  <button class="journal">journal</button>
  </a>

  <script>
  let currentPassword = ""; 
  const passwordLabel = document.getElementById("label");
  let isCopyFeedbackActive = false;

  function getSettings() {
      const savedSettings = localStorage.getItem('passwordSettings');
      if (savedSettings) {
          return JSON.parse(savedSettings);
      }
    
      return {
          length: 12,
          includeSymbols: true,
          includeNumbers: true,
          includeUppercase: true,
          includeLowercase: true
      };
  }

  function generate() {
      const settings = getSettings(); 
    
      let symbols = "";
      if (settings.includeLowercase) symbols += "abcdefghijklmnopqrstuvwxyz";
      if (settings.includeUppercase) symbols += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if (settings.includeNumbers) symbols += "0123456789";
      if (settings.includeSymbols) symbols += "!@#$%^&*"; 
    
      if (symbols.length === 0) {
          passwordLabel.innerText = "Error: No character types selected";
          passwordLabel.style.color = "#FF0000";
          return;
      }

      const pass = Array.from({ length: settings.length }, () => 
          symbols[Math.floor(Math.random() * symbols.length)]
      ).join("");
    
      currentPassword = pass; 
      passwordLabel.innerText = pass;
      passwordLabel.style.color = "#9400D3"; 
  }

  function copy() {
      const textToCopy = passwordLabel.innerText;

      if (!currentPassword || textToCopy === "Password" || isCopyFeedbackActive) {
        return;
      }
    
      isCopyFeedbackActive = true;
      navigator.clipboard.writeText(textToCopy).then(() => {
          const originalText = passwordLabel.innerText; 
          passwordLabel.innerText = "Copied!";
          passwordLabel.style.color = "#fff";

          setTimeout(() => {
              passwordLabel.innerText = originalText; 
              passwordLabel.style.color = "#9400D3";
              isCopyFeedbackActive = false;
          }, 800);
      });
  }

  document.addEventListener('DOMContentLoaded', (event) => {
  });
  </script>
